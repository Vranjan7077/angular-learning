<app-card>
    <div title>Map Transformation</div>

    <div content class="map-transformation">
        <p class="hint">
            This demo uses RxJS <code>map</code> to transform API users into a simpler UI shape.
        </p>

        <div class="actions">
            <button class="btn btn-primary" type="button" *ngIf="!hasLoaded" [disabled]="isLoading"
                (click)="loadMappedUsers()">
                Load Transformed Users
            </button>
            <button class="btn btn-secondary" type="button" (click)="reset()">Reset</button>
        </div>

        <p class="loader" *ngIf="isLoading">Loading...</p>
        <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

        <ul class="user-list" *ngIf="mappedUsers$ | async as users">
            <li class="user-item" *ngFor="let user of users">
                <span class="user-id">{{ user.id }}</span>
                <div>
                    <p class="user-name">{{ user.displayName }}</p>
                    <p class="user-email">{{ user.contact }}</p>
                </div>
            </li>
        </ul>

        <p class="empty" *ngIf="!isLoading && !errorMessage && !(mappedUsers$ | async)">
            Click "Load Transformed Users" to view mapped data.
        </p>
    </div>
</app-card>
