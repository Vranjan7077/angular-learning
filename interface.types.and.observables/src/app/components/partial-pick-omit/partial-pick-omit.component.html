<app-card>
    <div title>Partial / Pick / Omit</div>

    <div content class="type-demo">
        <p class="hint">Base type: <code>User</code> (from API)</p>

        <div class="actions">
            <button class="btn btn-primary" type="button" [disabled]="isLoading" (click)="loadData()">Load</button>
            <button class="btn btn-secondary" type="button" (click)="reset()">Reset</button>
        </div>

        <p class="status" *ngIf="isLoading">Loading...</p>
        <p class="status error" *ngIf="errorMessage">{{ errorMessage }}</p>

        <ng-container *ngIf="fullUser && userDraft && userPreview && userWithoutContact">
            <section class="block">
                <h4>Partial&lt;User&gt;</h4>
                <pre>{{ userDraft | json }}</pre>
            </section>

            <section class="block">
                <h4>Pick&lt;User, 'id' | 'name' | 'email'&gt;</h4>
                <pre>{{ userPreview | json }}</pre>
            </section>

            <section class="block">
                <h4>Omit&lt;User, 'email' | 'phone'&gt;</h4>
                <pre>{{ userWithoutContact | json }}</pre>
            </section>
        </ng-container>

        <p class="status" *ngIf="!isLoading && !errorMessage && !fullUser">Click Load.</p>
    </div>
</app-card>
