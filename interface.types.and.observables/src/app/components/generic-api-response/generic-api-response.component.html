<app-card>
    <div title>Generic API Response</div>

    <div content class="generic-api-response">
        <p class="hint">Type used: <code>ApiResponse&lt;Post[]&gt;</code></p>

        <div class="actions">
            <button class="btn btn-primary" type="button" [disabled]="isLoading" (click)="loadResponse()">Load</button>
            <button class="btn btn-secondary" type="button" (click)="reset()">Reset</button>
        </div>

        <p class="status" *ngIf="isLoading">Loading...</p>
        <p class="status error" *ngIf="errorMessage">{{ errorMessage }}</p>

        <ng-container *ngIf="response$ | async as response">
            <p class="status" *ngIf="response">{{ response.message }} ({{ response.data.length }} posts)</p>

            <ul class="user-list" *ngIf="response && response.data.length > 0">
                <li class="user-item" *ngFor="let post of response.data">{{ post.title }}</li>
            </ul>
        </ng-container>

        <p class="status" *ngIf="!isLoading && !errorMessage && !(response$ | async)">
            Click Load.
        </p>
    </div>
</app-card>
