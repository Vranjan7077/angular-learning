<app-card>
  <div title>ngOnChanges - React to Input Changes</div>
  <p content>Last change: {{ lastChangeDescription }}</p>
  <p content>Loaded from API (`{{ endpointUsed }}`): {{ countries.length }}</p>
  <ul content>
    <li *ngFor="let country of countries">
      <img [src]="country.flags.png" width="30" />
      {{ country.name.common }}
    </li>
  </ul>
</app-card>
