<main class="page-shell">
  <header class="page-header">
    <h1 class="page-title">{{ title }}</h1>
    <p class="page-subtitle">{{ subtitle }}</p>
  </header>

  <section class="card-grid">
    <app-translation-preview [userName]="userName"></app-translation-preview>

    <app-language-controls
      [userName]="userName"
      [supportedLangs]="supportedLangs"
      [currentLang]="currentLang"
      [currentLanguageLabel]="currentLanguageLabel"
      [currentDirection]="currentDirection"
      (userNameChange)="updateName($event)"
      (languageChange)="switchLangDropdown($event)"
    >
    </app-language-controls>

    <app-how-it-works
      [placeholderExample]="placeholderExample"
      [currentJsonPreview]="currentJsonPreview"
      [templatePreview]="currentSnippet.welcome"
      [resultPreview]="resultPreview"
    >
    </app-how-it-works>
  </section>
</main>
