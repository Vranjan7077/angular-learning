<div class="users-container page-shell">
  <section class="users-hero surface-card">
    <h1 class="page-title">User List</h1>
    <p class="page-intro">
      Choose a user to open a dynamic detail page and continue into nested post
      routes.
    </p>
  </section>

  <div *ngIf="loading" class="loading-panel">
    <div class="spinner" aria-hidden="true"></div>
    <p>Loading users...</p>
  </div>

  <div *ngIf="error" class="error-box">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error && users.length > 0" class="users-list">
    <app-card *ngFor="let user of users">
      <div title>{{ user.name }}</div>
      <div content>
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p><strong>Phone:</strong> {{ user.phone }}</p>
        <p><strong>Website:</strong> {{ user.website }}</p>
        <p><strong>Company:</strong> {{ user.company.name }}</p>
        <a [routerLink]="['/users', user.id]" class="btn btn-primary"
          >View Profile</a
        >
      </div>
    </app-card>
  </div>
</div>
