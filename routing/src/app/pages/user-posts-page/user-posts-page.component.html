<div class="user-posts-container">
  <div *ngIf="loading" class="loading-panel">
    <div class="spinner" aria-hidden="true"></div>
    <p>Loading posts...</p>
  </div>

  <div *ngIf="error" class="error-box">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error && posts.length > 0" class="posts-list">
    <app-card *ngFor="let post of posts">
      <div title class="post-title-row">
        <span>{{ post.title }}</span>
        <small>Post ID: {{ post.id }}</small>
      </div>
      <div content>
        <a
          [routerLink]="['/users', post.userId, 'posts', post.id]"
          class="post-link"
        >
          View Post Details
        </a>
      </div>
    </app-card>
  </div>

  <div *ngIf="!loading && !error && posts.length === 0" class="no-posts">
    <p>No posts found for this user.</p>
  </div>
</div>
