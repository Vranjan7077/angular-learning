<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="subtitle">Sign up to start taking notes</p>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

            <div class="form-group">
                <label>Username</label>
                <input formControlName="username" placeholder="Your name"
                    [class.is-invalid]="registerForm.get('username')?.invalid && registerForm.get('username')?.touched" />
                <small
                    *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.hasError('required')">
                    Username is required.
                </small>
                <small
                    *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.hasError('minlength')">
                    Minimum 3 characters.
                </small>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input formControlName="email" type="email" placeholder="you@example.com"
                    [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" />
                <small *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.hasError('required')">
                    Email is required.
                </small>
                <small *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.hasError('email')">
                    Enter a valid email.
                </small>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input formControlName="password" type="password" placeholder="••••••"
                    [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" />
                <small
                    *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.hasError('required')">
                    Password is required.
                </small>
                <small
                    *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.hasError('minlength')">
                    Minimum 6 characters.
                </small>
            </div>

            <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
            <p class="success" *ngIf="successMessage">{{ successMessage }}</p>

            <button type="submit" [disabled]="registerForm.invalid">Register</button>

        </form>

        <p class="switch">Already have an account? <a routerLink="/login">Login</a></p>
    </div>
</div>
